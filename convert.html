<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFlags Converter (Json to Lua)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0c0c0e;
    color: #c9c9d0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px;
  }

  .container {
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  h1 {
    font-size: 1rem;
    font-weight: 500;
    color: #555;
    letter-spacing: .04em;
    margin-bottom: 4px;
  }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  @media(max-width: 600px) { .panels { grid-template-columns: 1fr; } }

  .panel {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #444;
  }

  textarea {
    width: 100%;
    height: 360px;
    background: #111114;
    border: 1px solid #1e1e24;
    border-radius: 8px;
    color: #d0d0d8;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 0.75rem;
    line-height: 1.6;
    padding: 14px;
    resize: vertical;
    outline: none;
    transition: border-color .15s;
  }

  textarea:focus { border-color: #333340; }

  #outputArea { color: #7dbb78; }

  .bottom {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  button {
    padding: 8px 20px;
    border-radius: 6px;
    border: 1px solid #222228;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 500;
    background: #16161b;
    color: #aaa;
    transition: background .15s, color .15s;
  }

  button:hover { background: #1e1e25; color: #ddd; }
  button:active { transform: scale(.98); }

  #convertBtn {
    background: #1a1a40;
    border-color: #2a2a60;
    color: #8888ff;
  }
  #convertBtn:hover { background: #20204a; color: #aaaaf8; }

  #copyBtn.copied { background: #0e2018; border-color: #1a3828; color: #5dbb78; }

  .error {
    font-size: 0.75rem;
    color: #c06060;
    margin-left: auto;
  }
</style>
</head>
<body>
<div class="container">
  <h1>FFlags Converter (No Comments)</h1>

  <div class="panels">
    <div class="panel">
      <label>JSON Input</label>
      <textarea id="inputArea" placeholder='{"FFlagDebugDisplayFPS":"true"}' spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    </div>
    <div class="panel">
      <label>Lua Output</label>
      <textarea id="outputArea" readonly placeholder="Output will appear here after converting."></textarea>
    </div>
  </div>

  <div class="bottom">
    <button id="convertBtn">Convert</button>
    <button id="copyBtn">Copy</button>
    <span class="error" id="errorMsg"></span>
  </div>
</div>

<script>
const inputArea = document.getElementById('inputArea');
const outputArea = document.getElementById('outputArea');
const errorMsg = document.getElementById('errorMsg');

document.getElementById('convertBtn').addEventListener('click', convert);
document.getElementById('copyBtn').addEventListener('click', copyOutput);

inputArea.addEventListener('input', () => {
  outputArea.value = '';
  errorMsg.textContent = '';

  const val = inputArea.value.trim();
  if (val === '') return;

  try {
    const parsed = JSON.parse(val);
    if (typeof parsed !== 'object' || Array.isArray(parsed) || parsed === null) {
      errorMsg.textContent = 'Input must be a JSON object.';
    }
  } catch(e) {
    errorMsg.textContent = 'Invalid JSON.';
  }
});

function capitalizeValue(val) {
  if (val === null) return "nil";
  const s = String(val);
  if (s.toLowerCase() === 'true') return 'True';
  if (s.toLowerCase() === 'false') return 'False';
  if (s.toLowerCase() === 'nil') return 'False';
  return s;
}

function convert() {
  const input = inputArea.value.trim();
  errorMsg.textContent = '';

  let json;
  try {
    json = JSON.parse(input);
  } catch(e) {
    errorMsg.textContent = 'Invalid JSON: ' + e.message;
    return;
  }

  const seen = new Set();
  const entries = Object.entries(json).filter(([k]) => {
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });
  if (entries.length === 0) {
    errorMsg.textContent = 'No flags found.';
    return;
  }

  const flagLines = entries.map(([k, v]) => {
    return '    ' + k + ' = "' + capitalizeValue(v) + '",';
  }).join('\n');

  const lines = [
    'local cloneref = cloneref or function(x) return x end',
    'local HttpService = cloneref(game:GetService("HttpService"))',
    'local genv = getgenv or _G',
    '',
    'if genv.Bloxstrap and genv.Bloxstrap._Initialised then return end',
    '',
    'genv.Bloxstrap = genv.Bloxstrap or {}',
    'local Bloxstrap = genv.Bloxstrap',
    'Bloxstrap._Initialised = true',
    '',
    'local Files = {}',
    'local Write = writefile or function(n, c) Files[n] = c end',
    'local Read = readfile or function(n) return Files[n] end',
    'local Exists = isfile or function(n) return Files[n] ~= nil end',
    '',
    'local LogFile = "Bloxstrap/Logs/crashlog_" .. HttpService:GenerateGUID(false) .. ".txt"',
    'genv.errorlog = LogFile',
    '',
    'local function LogError(msg)',
    '    local existing = Exists(LogFile) and Read(LogFile) or ""',
    '    Write(LogFile, existing .. "\\n" .. os.date("[%c] ") .. msg)',
    'end',
    '',
    'local ModuleBase = "https://raw.githubusercontent.com/uwedot/flagging/refs/heads/main/"',
    'local function LoadModule(localPath, remoteName)',
    '    if Exists(localPath) then',
    '        local ok, res = pcall(loadstring, Read(localPath))',
    '        if ok and res then return res() end',
    '    end',
    '    ',
    '    local ok, src = pcall(cloneref(game).HttpGet, game, ModuleBase .. remoteName)',
    '    if not ok then ',
    '        LogError("Failed to fetch: " .. remoteName) ',
    '        return nil ',
    '    end',
    '    ',
    '    Write(localPath, src)',
    '    local ok2, fn = pcall(loadstring, src)',
    '    if not ok2 or not fn then ',
    '        LogError("Failed to compile: " .. remoteName) ',
    '        return nil ',
    '    end',
    '    ',
    '    return fn()',
    'end',
    '',
    'Bloxstrap.ToggleFFlag = LoadModule("Bloxstrap/Cache/ToggleFFlag.luau", "ToggleFFlag.luau")',
    'Bloxstrap.GetFFlag = LoadModule("Bloxstrap/Cache/GetFFlag.luau", "GetFFlag.luau")',
    '',
    'if not Bloxstrap.ToggleFFlag or not Bloxstrap.GetFFlag then return end',
    '',
    'Bloxstrap.TouchEnabled = cloneref(game:GetService("UserInputService")).TouchEnabled',
    '',
    'local Flags = {',
    flagLines,
    '}',
    '',
    'local FFlagFile = "Bloxstrap/FFlags.json"',
    'local SavedFlags = {}',
    '',
    'if Exists(FFlagFile) then',
    '    local ok, decoded = pcall(HttpService.JSONDecode, HttpService, Read(FFlagFile))',
    '    if ok and type(decoded) == "table" then',
    '        SavedFlags = decoded',
    '    end',
    'end',
    '',
    'local Failed = {}',
    'local Changed = false',
    '',
    'for Flag, Value in pairs(Flags) do',
    '    local ok, err = pcall(Bloxstrap.ToggleFFlag, Flag, Value)',
    '    ',
    '    if ok then',
    '        SavedFlags[Flag] = tostring(Value)',
    '        Changed = true',
    '    else',
    '        table.insert(Failed, string.format("  %s -> %s", Flag, err))',
    '    end',
    'end',
    '',
    'if Changed then',
    '    local ok, encoded = pcall(HttpService.JSONEncode, HttpService, SavedFlags)',
    '    if ok then',
    '        Write(FFlagFile, encoded)',
    '    else',
    '        LogError("JSONEncode failed: " .. tostring(encoded))',
    '    end',
    'end',
    '',
    'if #Failed > 0 then',
    '    LogError("Failed flags:\\n" .. table.concat(Failed, "\\n"))',
    'end'
  ];

  outputArea.value = lines.join('\n');
}

function copyOutput() {
  const out = outputArea.value;
  if (!out) return;

  const btn = document.getElementById('copyBtn');

  function onSuccess() {
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(out).then(onSuccess).catch(() => fallbackCopy(out, onSuccess));
  } else {
    fallbackCopy(out, onSuccess);
  }
}

function fallbackCopy(text, onSuccess) {
  outputArea.select();
  outputArea.setSelectionRange(0, 99999);
  try {
    document.execCommand('copy');
    onSuccess();
  } catch(e) {}
  window.getSelection().removeAllRanges();
}
</script>
</body>
</html>
