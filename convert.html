<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFlags Converter (New Template)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0c0c0e;
    color: #c9c9d0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px;
  }

  .container {
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  h1 {
    font-size: 1rem;
    font-weight: 500;
    color: #555;
    letter-spacing: .04em;
    margin-bottom: 4px;
  }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  @media(max-width: 600px) { .panels { grid-template-columns: 1fr; } }

  .panel {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #444;
  }

  textarea {
    width: 100%;
    height: 360px;
    background: #111114;
    border: 1px solid #1e1e24;
    border-radius: 8px;
    color: #d0d0d8;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 0.75rem;
    line-height: 1.6;
    padding: 14px;
    resize: vertical;
    outline: none;
    transition: border-color .15s;
  }

  textarea:focus { border-color: #333340; }

  #outputArea { color: #7dbb78; }

  .bottom {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  button {
    padding: 8px 20px;
    border-radius: 6px;
    border: 1px solid #222228;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 500;
    background: #16161b;
    color: #aaa;
    transition: background .15s, color .15s;
  }

  button:hover { background: #1e1e25; color: #ddd; }
  button:active { transform: scale(.98); }

  #convertBtn {
    background: #1a1a40;
    border-color: #2a2a60;
    color: #8888ff;
  }
  #convertBtn:hover { background: #20204a; color: #aaaaf8; }

  #copyBtn.copied { background: #0e2018; border-color: #1a3828; color: #5dbb78; }

  .error {
    font-size: 0.75rem;
    color: #c06060;
    margin-left: auto;
  }
</style>
</head>
<body>
<div class="container">
  <h1>FFlags Convert / JSON to LUA</h1>

  <div class="panels">
    <div class="panel">
      <label>JSON Input</label>
      <textarea id="inputArea" placeholder='{"FFlagDebugDisplayFPS":"true"}' spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    </div>
    <div class="panel">
      <label>Lua Output</label>
      <textarea id="outputArea" readonly placeholder="Output will appear here after converting."></textarea>
    </div>
  </div>

  <div class="bottom">
    <button id="convertBtn">Convert</button>
    <button id="copyBtn">Copy</button>
    <span class="error" id="errorMsg"></span>
  </div>
</div>

<script>
const inputArea = document.getElementById('inputArea');
const outputArea = document.getElementById('outputArea');
const errorMsg = document.getElementById('errorMsg');

document.getElementById('convertBtn').addEventListener('click', convert);
document.getElementById('copyBtn').addEventListener('click', copyOutput);

inputArea.addEventListener('input', () => {
  outputArea.value = '';
  errorMsg.textContent = '';

  const val = inputArea.value.trim();
  if (val === '') return;

  try {
    const parsed = JSON.parse(val);
    if (typeof parsed !== 'object' || Array.isArray(parsed) || parsed === null) {
      errorMsg.textContent = 'Input must be a JSON object.';
    }
  } catch(e) {
    errorMsg.textContent = 'Invalid JSON.';
  }
});

function capitalizeValue(val) {
  if (val === null) return "nil";
  const s = String(val);
  if (s.toLowerCase() === 'true') return 'True';
  if (s.toLowerCase() === 'false') return 'False';
  if (s.toLowerCase() === 'nil') return 'False';
  return s;
}

function convert() {
  const input = inputArea.value.trim();
  errorMsg.textContent = '';

  let json;
  try {
    json = JSON.parse(input);
  } catch(e) {
    errorMsg.textContent = 'Invalid JSON: ' + e.message;
    return;
  }

  const seen = new Set();
  const entries = Object.entries(json).filter(([k]) => {
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });
  if (entries.length === 0) {
    errorMsg.textContent = 'No flags found.';
    return;
  }

  const flagLines = entries.map(([k, v]) => {
    return '    ["' + k + '"] = "' + capitalizeValue(v) + '",';
  }).join('\n');

  const lines = [
    '-- fflags.lua (generated)',
    '',
    'local cloneref = cloneref or function(...) return ... end',
    'local HttpService = cloneref(game:GetService("HttpService"))',
    'local getgenv = getgenv or _G',
    '',
    'if getgenv().Bloxstrap and getgenv().Bloxstrap._Initialised then',
    '    return',
    'end',
    '',
    'getgenv().Bloxstrap = getgenv().Bloxstrap or {}',
    'local Bloxstrap = getgenv().Bloxstrap',
    'Bloxstrap._Initialised = true',
    '',
    'local Files = {}',
    'local WriteFile = writefile or function(Name, Src) Files[Name] = Src end',
    'local ReadFile = readfile  or function(Name) return Files[Name] end',
    'local IsFile = isfile    or function(Name) return Files[Name] ~= nil end',
    '',
    'local LogDir = "Bloxstrap/Logs/"',
    'getgenv().errorlog = getgenv().errorlog',
    '    or (LogDir .. "crashlog_" .. HttpService:GenerateGUID(false) .. ".txt")',
    '',
    'local function AppendError(Message)',
    '    local Existing = IsFile(getgenv().errorlog) and ReadFile(getgenv().errorlog) or ""',
    '    WriteFile(getgenv().errorlog, Existing .. "\\n" .. os.date("[%c] ") .. Message)',
    'end',
    '',
    'local FFlagPath = "Bloxstrap/FFlags.json"',
    'if not IsFile(FFlagPath) then',
    '    WriteFile(FFlagPath, "{}")',
    'end',
    '',
    'local ModuleBase = "https://raw.githubusercontent.com/uwedot/flagging/refs/heads/main/"',
    '',
    'local function LoadModule(LocalPath, RemoteName)',
    '    if IsFile(LocalPath) then',
    '        local Ok, Result = pcall(loadstring, ReadFile(LocalPath))',
    '        if Ok and Result then return Result() end',
    '    end',
    '    local Ok, Src = pcall(game.HttpGet, game, ModuleBase .. RemoteName)',
    '    if not Ok or not Src then',
    '        AppendError("Failed to fetch module: " .. RemoteName)',
    '        return nil',
    '    end',
    '    WriteFile(LocalPath, Src)',
    '    local Ok2, Result = pcall(loadstring, Src)',
    '    if not Ok2 or not Result then',
    '        AppendError("Failed to compile module: " .. RemoteName)',
    '        return nil',
    '    end',
    '    return Result()',
    'end',
    '',
    'Bloxstrap.ToggleFFlag = LoadModule("Bloxstrap/Cache/ToggleFFlag.luau", "ToggleFFlag.luau")',
    'Bloxstrap.GetFFlag    = LoadModule("Bloxstrap/Cache/GetFFlag.luau",    "GetFFlag.luau")',
    '',
    'if not Bloxstrap.ToggleFFlag or not Bloxstrap.GetFFlag then',
    '    return',
    'end',
    '',
    'Bloxstrap.TouchEnabled = cloneref(game:GetService("UserInputService")).TouchEnabled',
    '',
    'local Flags = {',
    flagLines,
    '}',
    '',
    'local function ApplyFlags()',
    '    local FFlagFile = {}',
    '    local Ok, Decoded = pcall(HttpService.JSONDecode, HttpService, ReadFile(FFlagPath))',
    '    if Ok and type(Decoded) == "table" then',
    '        FFlagFile = Decoded',
    '    end',
    '',
    '    local Failed = {}',
    '    local Changed = false',
    '',
    '    for Flag, Value in pairs(Flags) do',
    '        local SetOk, SetErr = pcall(Bloxstrap.ToggleFFlag, Flag, Value)',
    '        if SetOk then',
    '            FFlagFile[Flag] = tostring(Value)',
    '            Changed = true',
    '        else',
    '            table.insert(Failed, string.format("  %s -> %s", Flag, tostring(SetErr)))',
    '        end',
    '    end',
    '',
    '    if Changed then',
    '        local EncOk, Encoded = pcall(HttpService.JSONEncode, HttpService, FFlagFile)',
    '        if EncOk then',
    '            WriteFile(FFlagPath, Encoded)',
    '        else',
    '            AppendError("JSONEncode failed: " .. tostring(Encoded))',
    '        end',
    '    end',
    '',
    '    if #Failed > 0 then',
    '        AppendError("Failed flags:\\n" .. table.concat(Failed, "\\n"))',
    '    end',
    'end',
    '',
    'ApplyFlags()'
  ];

  outputArea.value = lines.join('\n');
}

function copyOutput() {
  const out = outputArea.value;
  if (!out) return;

  const btn = document.getElementById('copyBtn');

  function onSuccess() {
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(out).then(onSuccess).catch(() => fallbackCopy(out, onSuccess));
  } else {
    fallbackCopy(out, onSuccess);
  }
}

function fallbackCopy(text, onSuccess) {
  outputArea.select();
  outputArea.setSelectionRange(0, 99999);
  try {
    document.execCommand('copy');
    onSuccess();
  } catch(e) {}
  window.getSelection().removeAllRanges();
}
</script>
</body>
</html>
