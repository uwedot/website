<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="dns-prefetch" href="//docs.google.com">
  <link rel="preconnect" href="https://docs.google.com" crossorigin>
  <meta name="description" content="A fan-made archive of Ye's unreleased discography.">
  <meta name="theme-color" content="#0b0b0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta property="og:title" content="YE VAULT">
  <meta property="og:description" content="A fan-made archive of Ye's unreleased discography.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:,">
  <title>YE VAULT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<a class="skip-link" href="#main-content">Skip to content</a>

<nav class="nav" aria-label="Site navigation">
  <div class="nav-logo">Ye Vault</div>
  <div class="nav-dropdown-container">
    <button type="button" id="nav-tab-btn" class="nav-dropdown-btn" aria-haspopup="true" aria-expanded="false">
      <span id="nav-btn-text">Unreleased</span>
      <svg class="dropdown-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="6,9 12,15 18,9"/>
      </svg>
    </button>
    <div id="nav-tab-menu" class="nav-dropdown-menu" role="menu">
      <div class="nav-dropdown-item active" data-tab="all"     role="menuitem">Unreleased</div>
      <div class="nav-dropdown-item"        data-tab="best"    role="menuitem">Best Of</div>
      <div class="nav-dropdown-item"        data-tab="special" role="menuitem">Special</div>
      <div class="nav-dropdown-item"        data-tab="recent"  role="menuitem">Recent</div>
    </div>
  </div>
  <div class="nav-stats">
    <div class="nav-stat">Eras: <span id="nav-eras">0</span></div>
    <div class="nav-stat">Songs: <span id="nav-songs">0</span></div>
  </div>
</nav>

<header class="hero">
  <div class="hero-label">Archive Collection</div>
  <h1 class="hero-title">YE VAULT</h1>
  <p class="hero-sub">Ye's unreleased discography</p>
</header>

<main id="main-content">
  <div class="controls-row">
    <div class="search-wrap">
      <label for="search-box" class="sr-only">Search songs or eras</label>
      <div class="search-inner">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="search-box" class="search-box" type="search" placeholder="Search songs or eras…" autocomplete="off" spellcheck="false">
      </div>
    </div>
    <div class="filter-dropdown-container">
      <button type="button" id="filter-btn" class="filter-dropdown-btn">
        Filter Quality
        <svg class="dropdown-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="6,9 12,15 18,9"/>
        </svg>
      </button>
      <div id="filter-menu" class="filter-dropdown-menu" role="menu">
        <div class="filter-item active" data-quality="rec"     role="menuitemcheckbox" aria-checked="true">Recording</div>
        <div class="filter-item active" data-quality="low"     role="menuitemcheckbox" aria-checked="true">Low Quality</div>
        <div class="filter-item active" data-quality="high"    role="menuitemcheckbox" aria-checked="true">High Quality</div>
        <div class="filter-item active" data-quality="cd"      role="menuitemcheckbox" aria-checked="true">CD Quality</div>
        <div class="filter-item active" data-quality="lossless"role="menuitemcheckbox" aria-checked="true">Lossless</div>
      </div>
    </div>
  </div>

  <div class="era-list" id="era-list" aria-live="polite">
    <div class="skeleton-wrap">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>
</main>

<footer class="footer">
  <p class="footer-text">Not affiliated with Yeezy LLC</p>
</footer>

<button type="button" id="scroll-top" class="scroll-top" aria-label="Scroll to top">
  <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" aria-hidden="true">
    <line x1="12" y1="19" x2="12" y2="5"/>
    <polyline points="5,12 12,5 19,12"/>
  </svg>
</button>

<div id="global-player" class="global-player" aria-label="Audio player">
  <audio id="main-audio" preload="none"></audio>

  <div class="player-info">
    <span id="player-track-name" class="player-track-name"></span>
    <div class="player-track-times">
      <span id="player-track-current" class="player-track-current">0:00</span>
      <span class="player-track-sep" aria-hidden="true">/</span>
      <span id="player-track-length" class="player-track-length">0:00</span>
    </div>
  </div>

  <div class="player-controls">
    <button type="button" id="player-play-btn" class="player-btn player-play" aria-label="Play">
      <svg id="player-play-icon"  viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><polygon points="5,3 19,12 5,21"/></svg>
      <svg id="player-pause-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
  </div>

  <div class="player-scrubber-wrap">
    <span id="player-current" class="player-time" aria-label="Current time">0:00</span>
    <div class="player-scrubber" id="player-scrubber" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="player-scrubber-track">
        <div class="player-scrubber-fill" id="player-fill"></div>
        <div class="player-scrubber-thumb" id="player-thumb"></div>
      </div>
    </div>
    <span id="player-duration" class="player-time" aria-label="Duration">0:00</span>
  </div>

  <div class="player-volume-wrap">
    <svg class="player-vol-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
      <path id="vol-wave-1" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path id="vol-wave-2" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
    <div class="player-volume" id="player-volume" role="slider" aria-label="Volume" aria-valuemin="0" aria-valuemax="100" aria-valuenow="80">
      <div class="player-scrubber-track">
        <div class="player-scrubber-fill" id="player-vol-fill"></div>
        <div class="player-scrubber-thumb" id="player-vol-thumb"></div>
      </div>
    </div>
  </div>

  <button type="button" id="player-close-btn" class="player-btn player-close" aria-label="Close player">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<script src="app.js" defer></script>
</body>
</html>
