<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A fan-made archive of Ye's unreleased discography.">
  <meta name="theme-color" content="#0b0b0c">
  <meta property="og:title" content="YE VAULT">
  <meta property="og:description" content="A fan-made archive of Ye's unreleased discography.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:,">
  <title>YE VAULT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav" aria-label="Site navigation">
  <div class="nav-logo">Ye Vault</div>
  <div class="nav-dropdown-container">
    <button type="button" id="nav-tab-btn" class="nav-dropdown-btn">
      <span id="nav-btn-text">Unreleased</span>
      <svg class="dropdown-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="6,9 12,15 18,9"/>
      </svg>
    </button>
    <div id="nav-tab-menu" class="nav-dropdown-menu" role="menu">
      <div class="nav-dropdown-item active" data-tab="all" role="menuitem">Unreleased</div>
      <div class="nav-dropdown-item" data-tab="best" role="menuitem">Best Of</div>
      <div class="nav-dropdown-item" data-tab="special" role="menuitem">Special</div>
    </div>
  </div>
  <div class="nav-stats">
    <div class="nav-stat">Eras: <span id="nav-eras">0</span></div>
    <div class="nav-stat">Songs: <span id="nav-songs">0</span></div>
  </div>
</nav>

<header class="hero">
  <div class="hero-label">Archive Collection</div>
  <h1 class="hero-title">YE VAULT</h1>
  <p class="hero-sub">Ye's unreleased discography</p>
</header>

<main>
  <div class="controls-row">
    <div class="search-wrap">
      <label for="search-box" class="sr-only">Search songs or eras</label>
      <div class="search-inner">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="search-box" class="search-box" type="search" placeholder="Search songs or eras…" autocomplete="off" spellcheck="false">
      </div>
    </div>

    <div class="filter-dropdown-container">
      <button type="button" id="filter-btn" class="filter-dropdown-btn">
        Filter Quality
        <svg class="dropdown-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="6,9 12,15 18,9"/>
        </svg>
      </button>
      <div id="filter-menu" class="filter-dropdown-menu" role="menu">
        <div class="filter-item active" data-quality="high" role="menuitemcheckbox" aria-checked="true">High Quality</div>
        <div class="filter-item active" data-quality="low" role="menuitemcheckbox" aria-checked="true">Low Quality</div>
        <div class="filter-item active" data-quality="rec" role="menuitemcheckbox" aria-checked="true">Recording</div>
        <div class="filter-item active" data-quality="cd" role="menuitemcheckbox" aria-checked="true">CD Quality</div>
        <div class="filter-item active" data-quality="lossless" role="menuitemcheckbox" aria-checked="true">Lossless</div>
      </div>
    </div>
  </div>

  <div class="era-list" id="era-list" aria-live="polite">
    <div class="skeleton-wrap">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </div>
</main>

<footer class="footer">
  <p class="footer-text">Not affiliated with Yeezy LLC</p>
</footer>

<button type="button" id="scroll-top" class="scroll-top" aria-label="Scroll to top">
  <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <line x1="12" y1="19" x2="12" y2="5"/>
    <polyline points="5,12 12,5 19,12"/>
  </svg>
</button>

<script src="app.js"></script>
</body>
</html>
