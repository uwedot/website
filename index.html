<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b0c">
  <meta name="color-scheme" content="dark">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MISTAPE">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <title>MISTAPE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<script>document.documentElement.classList.remove('no-js');</script>
<noscript>
  <div class="no-js-screen">
    <p class="no-js-title">JavaScript Required</p>
    <p class="no-js-msg">Enable JavaScript in your browser to use MISTAPE.</p>
  </div>
</noscript>

<a class="skip-link" href="#main-content">Skip to content</a>

<nav class="nav" aria-label="Site navigation">
  <div class="nav-logo">
    <span class="nav-logo-name">MISTAPE</span>
    <span class="nav-logo-sub">Unreleased Discography</span>
  </div>

  <div class="nav-dropdown-container">
    <button type="button" id="nav-tab-btn" class="nav-dropdown-btn"
            aria-haspopup="true" aria-expanded="false">
      <span id="nav-btn-text">Unreleased</span>
      <svg class="dropdown-chevron" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="6,9 12,15 18,9"/>
      </svg>
    </button>
    <div id="nav-tab-menu" class="nav-dropdown-menu" role="menu">
      <div class="nav-dropdown-item active" data-tab="all"     role="menuitem">Unreleased</div>
      <div class="nav-dropdown-item"        data-tab="best"    role="menuitem">Best Of</div>
      <div class="nav-dropdown-item"        data-tab="special" role="menuitem">Special</div>
      <div class="nav-dropdown-item"        data-tab="recent"  role="menuitem">Recent</div>
    </div>
  </div>

  <div class="nav-stats" aria-label="Stats">
    <div class="nav-stat">Songs: <span id="nav-songs">-</span></div>
    <button type="button" id="settings-btn" class="settings-btn" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
</nav>

<main id="main-content">
  <div class="controls-row">
    <div class="search-wrap">
      <label for="search-box" class="sr-only">Search songs</label>
      <div class="search-inner">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="search-box" class="search-box" type="search"
               placeholder="Search songs or eras…"
               autocomplete="off" spellcheck="false">
      </div>
    </div>

    <div class="filter-dropdown-container">
      <button type="button" id="quality-filter-btn" class="filter-dots-btn"
              aria-haspopup="true" aria-expanded="false" aria-label="Filter by quality">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <circle cx="5"  cy="12" r="1.5"/>
          <circle cx="12" cy="12" r="1.5"/>
          <circle cx="19" cy="12" r="1.5"/>
        </svg>
      </button>
      <div id="quality-filter-menu" class="filter-dropdown-menu" role="menu">
        <div class="filter-item active" data-quality="unavail"  role="menuitemcheckbox" aria-checked="true">Not Available</div>
        <div class="filter-item active" data-quality="rec"      role="menuitemcheckbox" aria-checked="true">Recording</div>
        <div class="filter-item active" data-quality="low"      role="menuitemcheckbox" aria-checked="true">Low Quality</div>
        <div class="filter-item active" data-quality="high"     role="menuitemcheckbox" aria-checked="true">High Quality</div>
        <div class="filter-item active" data-quality="cd"       role="menuitemcheckbox" aria-checked="true">CD Quality</div>
        <div class="filter-item active" data-quality="lossless" role="menuitemcheckbox" aria-checked="true">Lossless</div>
      </div>
    </div>
  </div>

  <div class="era-list" id="era-list"
       role="list" aria-live="polite" aria-label="Era list">
    <div class="loading-msg">Loading data…</div>
  </div>
</main>

<footer class="footer">
  <p class="footer-text">I have no affiliation with any labels, and I do not host or distribute any files.</p>
</footer>

<button type="button" id="scroll-top" class="scroll-top" aria-label="Scroll to top">
  <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
       fill="none" aria-hidden="true">
    <line x1="12" y1="19" x2="12" y2="5"/>
    <polyline points="5,12 12,5 19,12"/>
  </svg>
</button>

<div id="global-player" class="global-player"
     role="region" aria-label="Audio player" hidden>
  <audio id="main-audio" preload="none"></audio>

  <div class="player-info">
    <span id="player-track-name" class="player-track-name" aria-live="polite"></span>
    <div class="player-track-times" aria-hidden="true">
      <span id="player-track-current" class="player-track-current">0:00</span>
      <span id="player-track-length"  class="player-track-length">0:00</span>
    </div>
  </div>

  <div class="player-controls">
    <button type="button" id="player-play-btn"
            class="player-btn player-play" aria-label="Play">
      <svg id="player-play-icon"  viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
      <svg id="player-pause-icon" viewBox="0 0 24 24" fill="currentColor"
           aria-hidden="true" style="display:none">
        <rect x="6"  y="4" width="4" height="16"/>
        <rect x="14" y="4" width="4" height="16"/>
      </svg>
    </button>
  </div>

  <div class="player-scrubber-wrap">
    <span id="player-current" class="player-time" aria-label="Current time">0:00</span>
    <div class="player-scrubber" id="player-scrubber"
         role="slider" aria-label="Seek position"
         aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
      <div class="player-scrubber-track">
        <div class="player-scrubber-fill" id="player-fill"></div>
        <div class="player-scrubber-thumb" id="player-thumb"></div>
      </div>
    </div>
    <span id="player-duration" class="player-time" aria-label="Duration">0:00</span>
  </div>

  <div class="player-volume-wrap">
    <svg class="player-vol-icon" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" aria-hidden="true">
      <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
    <div class="player-volume" id="player-volume"
         role="slider" aria-label="Volume"
         aria-valuemin="0" aria-valuemax="100" aria-valuenow="80" tabindex="0">
      <div class="player-scrubber-track">
        <div class="player-scrubber-fill" id="player-vol-fill"></div>
        <div class="player-scrubber-thumb" id="player-vol-thumb"></div>
      </div>
    </div>
  </div>

  <button type="button" id="player-close-btn"
          class="player-btn player-close" aria-label="Close player">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" aria-hidden="true">
      <line x1="18" y1="6"  x2="6"  y2="18"/>
      <line x1="6"  y1="6"  x2="18" y2="18"/>
    </svg>
  </button>
</div>

<div id="settings-modal" class="settings-modal"
     role="dialog" aria-modal="true" aria-labelledby="settings-title" hidden>
  <div class="settings-modal-inner">
    <div class="settings-modal-header">
      <span id="settings-title" class="settings-modal-title">Settings</span>
      <button type="button" id="settings-close-btn"
              class="settings-close-btn" aria-label="Close settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" aria-hidden="true">
          <line x1="18" y1="6"  x2="6"  y2="18"/>
          <line x1="6"  y1="6"  x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <label for="settings-artist-select" class="settings-label">Artist Preset</label>
    <select id="settings-artist-select" class="settings-artist-select">
      
      <option value="1cC-caBQ4j-OWreS37ackw7Gkkq83Hvi6x-mIRHBLxJo">Kanye West</option>
      <option value="1v55XAPLzw1iuWxH1OQKajCIYPhW2BXcLoV4mXDZ55DI">Drake</option>
      <option value="1Irtfvymu26CShYowLMMfD-rM0o9CJqE6-BBSlYsAaF4">Playboi Carti</option>
      <option value="1_D-puv6fjwCjrx9x7qAu9oYzUfFzDLrLz1cElaXndso">Daniel Caesar</option>
    </select>

    <p id="settings-rate-msg" class="settings-rate-msg" hidden></p>

    <div class="settings-toggle-row">
      <label for="playable-only-toggle" class="settings-toggle-label">Hide Unavailable Songs</label>
      <button type="button" id="playable-only-toggle"
              class="settings-toggle" role="switch"
              aria-checked="false" aria-label="Hide Unavailable Songs"></button>
    </div>

    <div class="settings-actions">
      <button type="button" id="settings-reset-btn" class="settings-reset-btn">Reset to Default</button>
      <button type="button" id="settings-apply-btn" class="settings-apply-btn">Apply</button>
    </div>
  </div>
</div>

<script src="app.js" defer></script>
</body>
</html>
