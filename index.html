<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFlags Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #060609;
  --surface:     #0c0c14;
  --surface2:    #09090f;
  --border:      #18192a;
  --border-hi:   #282940;
  --accent:      #6366f1;
  --accent-dim:  #141530;
  --accent-glow: rgba(99,102,241,.18);
  --accent-hi:   #a5b4fc;
  --green:       #34d399;
  --green-dim:   #0a1f16;
  --green-glow:  rgba(52,211,153,.15);
  --red:         #f87171;
  --amber:       #fbbf24;
  --text:        #d4d8f0;
  --text-mid:    #4e527a;
  --text-dim:    #252740;
  --mono:        'Geist Mono', monospace;
  --sans:        'Geist', sans-serif;
  --r:           12px;
  --r-sm:        8px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  padding: 28px 28px 60px;
}

/* glow */
.glow {
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 900px; height: 500px;
  background: radial-gradient(ellipse, rgba(99,102,241,.09) 0%, transparent 68%);
  pointer-events: none;
  z-index: 0;
}

/* page content above glow */
.page { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 22px;
  margin-bottom: 26px;
  border-bottom: 1px solid var(--border);
}

.brand { display: flex; align-items: center; gap: 14px; }

.brand-icon {
  width: 38px; height: 38px;
  background: var(--accent-dim);
  border: 1px solid rgba(99,102,241,.2);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 20px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,.04);
}

.brand-name {
  font-size: 1.05rem;
  font-weight: 600;
  color: #fff;
  letter-spacing: -.03em;
  line-height: 1;
}

.brand-sub {
  font-family: var(--mono);
  font-size: .62rem;
  color: var(--text-mid);
  letter-spacing: .1em;
  margin-top: 4px;
}

.status-pill {
  display: flex; align-items: center; gap: 7px;
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: .1em;
  color: var(--accent-hi);
  background: var(--accent-dim);
  border: 1px solid rgba(99,102,241,.2);
  border-radius: 99px;
  padding: 6px 14px;
}

.pill-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 5px var(--accent);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── PANELS GRID ── */
.panels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (max-width: 700px) { .panels { grid-template-columns: 1fr; } }

/* ── EDITOR PANEL ── */
.panel {
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--surface);
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
  box-shadow: 0 2px 12px rgba(0,0,0,.3);
}
.panel:focus-within {
  border-color: rgba(99,102,241,.25);
  box-shadow: 0 0 0 3px rgba(99,102,241,.05), 0 8px 32px rgba(0,0,0,.5);
}
.panel.out:focus-within {
  border-color: rgba(52,211,153,.22);
  box-shadow: 0 0 0 3px var(--green-glow), 0 8px 32px rgba(0,0,0,.5);
}
.panel.error {
  border-color: rgba(248,113,113,.25);
  box-shadow: 0 0 0 3px rgba(248,113,113,.04);
}
.panel.drag-over {
  border-color: var(--green);
  box-shadow: 0 0 0 3px var(--green-glow);
}

/* panel titlebar */
.panel-title-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.panel-left { display: flex; align-items: center; gap: 8px; }

.dots { display: flex; gap: 5px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-r { background: #ff5f57; }
.dot-y { background: #febc2e; }
.dot-g { background: #28c840; }

.panel-filename {
  font-family: var(--mono);
  font-size: .72rem;
  color: var(--text-mid);
  letter-spacing: .06em;
}

.panel-right { display: flex; align-items: center; gap: 8px; }

.lang-tag {
  font-family: var(--mono);
  font-size: .62rem;
  font-weight: 500;
  letter-spacing: .14em;
  padding: 2px 8px;
  border-radius: 4px;
}
.lang-json { color: var(--amber); background: rgba(251,191,36,.07); border: 1px solid rgba(251,191,36,.15); }
.lang-lua  { color: #51a0f5; background: rgba(81,160,245,.06); border: 1px solid rgba(81,160,245,.18); }

/* small panel buttons */
.panel-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid rgba(52,211,153,.18);
  background: rgba(52,211,153,.04);
  color: var(--green);
  font-family: var(--mono);
  font-size: .66rem;
  letter-spacing: .06em;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: background .15s, border-color .15s;
}
.panel-btn:hover { background: rgba(52,211,153,.1); border-color: rgba(52,211,153,.35); }
.panel-btn:disabled { opacity: .25; cursor: not-allowed; pointer-events: none; }
.panel-btn input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.panel-btn .icon { width: 12px; height: 12px; }

/* editor area */
.editor-area {
  display: flex;
  height: 340px;
  overflow: hidden;
}

.line-nums {
  width: 44px;
  flex-shrink: 0;
  background: var(--surface2);
  border-right: 1px solid var(--border);
  padding: 14px 10px 14px 0;
  font-family: var(--mono);
  font-size: .82rem;
  line-height: 1.65;
  color: var(--text-dim);
  text-align: right;
  user-select: none;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.line-nums span { display: block; line-height: 1.65; font-size: .82rem; }

textarea {
  flex: 1;
  height: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--mono);
  font-size: .82rem;
  line-height: 1.65;
  padding: 14px 16px;
  outline: none;
  resize: none;
  overflow: auto;
  white-space: pre;
  word-wrap: normal;
  tab-size: 4;
}
#outputArea { color: var(--green); }
textarea::placeholder { color: var(--text-dim); }

/* status bar */
.panel-status {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 14px;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.stat {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--mono);
  font-size: .65rem;
  color: var(--text-dim);
  letter-spacing: .04em;
}
.stat.on { color: var(--green); }
.stat .icon { width: 11px; height: 11px; }

/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 20px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-mid);
  font-family: var(--sans);
  font-size: .85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  letter-spacing: -.01em;
}
.btn .icon { width: 14px; height: 14px; }
.btn:hover { background: #101020; color: var(--text); border-color: var(--border-hi); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.4); }
.btn:active { transform: scale(.97); }

.btn-convert {
  background: linear-gradient(135deg, #32337e, #1e1f52);
  border-color: rgba(99,102,241,.35);
  color: var(--accent-hi);
  box-shadow: 0 0 20px rgba(99,102,241,.1);
}
.btn-convert:hover {
  background: linear-gradient(135deg, #3e3f98, #252662);
  border-color: rgba(99,102,241,.55);
  color: #ccd0ff;
  box-shadow: 0 0 28px rgba(99,102,241,.22);
}

.btn-clear:hover { background: rgba(248,113,113,.06); border-color: rgba(248,113,113,.25); color: var(--red); }

.err {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--mono);
  font-size: .72rem;
  color: var(--red);
  margin-left: auto;
  opacity: 0;
  transform: translateX(5px);
  transition: opacity .2s, transform .2s;
}
.err.show { opacity: 1; transform: translateX(0); }
.err .icon { width: 13px; height: 13px; }

/* ── FOOTER ── */
.footer {
  margin-top: 28px;
  font-family: var(--mono);
  font-size: .62rem;
  color: var(--text-dim);
  letter-spacing: .12em;
  text-align: center;
}

/* ── ANIMATIONS ── */
.topbar  { animation: up .45s cubic-bezier(.16,1,.3,1) both; }
.panels  { animation: up .45s cubic-bezier(.16,1,.3,1) .07s both; }
.toolbar { animation: up .45s cubic-bezier(.16,1,.3,1) .13s both; }
@keyframes up { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="glow"></div>
<div class="page">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
          <line x1="4" y1="22" x2="4" y2="15"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">FFlags Converter</div>
        <div class="brand-sub">JSON TO LUA</div>
      </div>
    </div>
    <div class="status-pill">
      <div class="pill-dot"></div>
      READY
    </div>
  </div>

  <!-- PANELS -->
  <div class="panels">

    <!-- INPUT -->
    <div class="panel" id="inputPanel">
      <div class="panel-title-bar">
        <div class="panel-left">
          <div class="dots">
            <div class="dot dot-r"></div>
            <div class="dot dot-y"></div>
            <div class="dot dot-g"></div>
          </div>
          <span class="panel-filename">input.json</span>
        </div>
        <div class="panel-right">
          <button class="panel-btn" id="uploadBtn">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Upload
            <input type="file" accept=".json,application/json" id="fileInput">
          </button>
          <span class="lang-tag lang-json">JSON</span>
        </div>
      </div>
      <div class="editor-area">
        <div class="line-nums" id="inputNums"><span>1</span></div>
        <textarea id="inputArea" placeholder='{"FFlagDebugDisplayFPS":"true"}' spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </div>
      <div class="panel-status">
        <div class="stat" id="inputStat">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span id="inputStatTxt">EMPTY</span>
        </div>
        <div class="stat">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 17 10 11 4 5"/>
            <line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
          <span id="inputLines">0 lines</span>
        </div>
      </div>
    </div>

    <!-- OUTPUT -->
    <div class="panel out" id="outputPanel">
      <div class="panel-title-bar">
        <div class="panel-left">
          <div class="dots">
            <div class="dot dot-r"></div>
            <div class="dot dot-y"></div>
            <div class="dot dot-g"></div>
          </div>
          <span class="panel-filename">output.lua</span>
        </div>
        <div class="panel-right">
          <button class="panel-btn" id="downloadBtn" disabled>
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download
          </button>
          <span class="lang-tag lang-lua">LUA</span>
        </div>
      </div>
      <div class="editor-area">
        <div class="line-nums" id="outputNums"><span>1</span></div>
        <textarea id="outputArea" readonly placeholder="Converted Lua output will appear here..."></textarea>
      </div>
      <div class="panel-status">
        <div class="stat" id="outputStat">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span id="outputStatTxt">WAITING</span>
        </div>
        <div class="stat">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 17 10 11 4 5"/>
            <line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
          <span id="outputLines">0 lines</span>
        </div>
      </div>
    </div>

  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="btn btn-convert" id="convertBtn">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 3 21 3 21 9"/>
        <polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/>
        <line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
      Convert to Lua
    </button>

    <button class="btn btn-clear" id="clearBtn">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
      Clear
    </button>

    <div class="err" id="errMsg">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errTxt"></span>
    </div>
  </div>

  <div class="footer">FFLAG CONVERTER / JSON TO LUA</div>

</div>
<script>
const inputArea  = document.getElementById('inputArea');
const outputArea = document.getElementById('outputArea');
const inputPanel = document.getElementById('inputPanel');
const errMsg     = document.getElementById('errMsg');
const errTxt     = document.getElementById('errTxt');
const fileInput  = document.getElementById('fileInput');
const downloadBtn = document.getElementById('downloadBtn');

// ── line numbers ──
function updateNums(ta, id) {
  const count = (ta.value.match(/\n/g) || []).length + 1;
  const el = document.getElementById(id);
  el.innerHTML = Array.from({length: count}, (_, i) => '<span>' + (i+1) + '</span>').join('');
}
inputArea.addEventListener('scroll',  () => document.getElementById('inputNums').scrollTop  = inputArea.scrollTop);
outputArea.addEventListener('scroll', () => document.getElementById('outputNums').scrollTop = outputArea.scrollTop);

function refreshInput() {
  updateNums(inputArea, 'inputNums');
  const n = inputArea.value.split('\n').length;
  document.getElementById('inputLines').textContent = n + ' line' + (n !== 1 ? 's' : '');
}
function refreshOutput() {
  updateNums(outputArea, 'outputNums');
  const n = outputArea.value ? outputArea.value.split('\n').length : 0;
  document.getElementById('outputLines').textContent = n + ' line' + (n !== 1 ? 's' : '');
}

// ── status ──
function setInputStat(txt, on) {
  document.getElementById('inputStatTxt').textContent = txt;
  document.getElementById('inputStat').className = 'stat' + (on ? ' on' : '');
}
function setOutputStat(txt, on) {
  document.getElementById('outputStatTxt').textContent = txt;
  document.getElementById('outputStat').className = 'stat' + (on ? ' on' : '');
}

// ── error ──
function showErr(msg) {
  errTxt.textContent = msg;
  msg ? errMsg.classList.add('show') : errMsg.classList.remove('show');
  msg ? inputPanel.classList.add('error') : inputPanel.classList.remove('error');
}

// ── strip JSON comments (// and /* */) ──
function stripComments(str) {
  let out = '';
  let i = 0;
  while (i < str.length) {
    // inside string — copy verbatim
    if (str[i] === '"') {
      out += str[i++];
      while (i < str.length) {
        if (str[i] === '\\') { out += str[i++]; out += str[i++]; }
        else if (str[i] === '"') { out += str[i++]; break; }
        else { out += str[i++]; }
      }
    }
    // line comment
    else if (str[i] === '/' && str[i+1] === '/') {
      while (i < str.length && str[i] !== '\n') i++;
    }
    // block comment
    else if (str[i] === '/' && str[i+1] === '*') {
      i += 2;
      while (i < str.length && !(str[i] === '*' && str[i+1] === '/')) i++;
      i += 2;
    }
    else { out += str[i++]; }
  }
  return out;
}

// ── live validation ──
inputArea.addEventListener('input', () => {
  outputArea.value = ''; refreshOutput();
  setOutputStat('WAITING', false);
  showErr(''); refreshInput();
  const val = inputArea.value.trim();
  if (!val) { setInputStat('EMPTY', false); return; }
  const stripped = stripComments(val).trim();
  const hasComments = /\/\/|\/\*/.test(val);
  try {
    const p = JSON.parse(stripped);
    if (typeof p !== 'object' || Array.isArray(p) || p === null) {
      showErr('Input must be a JSON object.'); setInputStat('INVALID', false);
    } else {
      const c = Object.keys(p).length;
      setInputStat(c + ' FLAG' + (c !== 1 ? 'S' : '') + ' FOUND', true);
    }
  } catch(e) {
    // if the input has comments and stripping still fails, don't cry invalid —
    // the user may still be typing the comment or the json around it
    if (!hasComments) {
      showErr('Invalid JSON.'); setInputStat('INVALID', false);
    } else {
      setInputStat('PARSING...', false);
    }
  }
});

// ── upload ──
fileInput.addEventListener('change', () => {
  const file = fileInput.files[0]; if (!file) return;
  new FileReader().onload = e => { inputArea.value = e.target.result; inputArea.dispatchEvent(new Event('input')); };
  const r = new FileReader(); r.onload = e => { inputArea.value = e.target.result; inputArea.dispatchEvent(new Event('input')); }; r.readAsText(file);
  fileInput.value = '';
});

// ── drag drop ──
inputPanel.addEventListener('dragover',  e => { e.preventDefault(); inputPanel.classList.add('drag-over'); });
inputPanel.addEventListener('dragleave', () => inputPanel.classList.remove('drag-over'));
inputPanel.addEventListener('drop', e => {
  e.preventDefault(); inputPanel.classList.remove('drag-over');
  const file = e.dataTransfer.files[0]; if (!file) return;
  const r = new FileReader(); r.onload = ev => { inputArea.value = ev.target.result; inputArea.dispatchEvent(new Event('input')); }; r.readAsText(file);
});

// ── converter ──
function capitalizeValue(val) {
  if (val === null) return "nil";
  const s = String(val);
  if (s.toLowerCase() === 'true')  return 'True';
  if (s.toLowerCase() === 'false') return 'False';
  if (s.toLowerCase() === 'nil')   return 'False';
  return s;
}

document.getElementById('convertBtn').addEventListener('click', () => {
  const input = inputArea.value.trim();
  showErr('');
  if (!input) { showErr('Paste or upload a JSON object first.'); return; }
  let json;
  try { json = JSON.parse(stripComments(input)); } catch(e) { showErr('Invalid JSON: ' + e.message); return; }
  if (typeof json !== 'object' || Array.isArray(json) || json === null) { showErr('Input must be a JSON object.'); return; }
  const seen = new Set();
  const entries = Object.entries(json).filter(([k]) => { if (seen.has(k)) return false; seen.add(k); return true; });
  if (!entries.length) { showErr('No flags found.'); return; }

  const prefixes = ["DFInt","DFFlag","FString","FLog","FFlag","FInt"];
  function stripPrefix(k) {
    for (const p of prefixes) { if (k.startsWith(p)) return k.slice(p.length); }
    return k;
  }

  const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  const flagLines = entries.map(([k,v]) => {
    const key = isMobile ? stripPrefix(k) : k;
    const val = (v === null || v === undefined) ? 'nil' : '"' + String(v).replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"';
    return 'setfflag("' + key + '", ' + val + ')';
  }).join('\n');

  outputArea.value = flagLines;

  refreshOutput();
  setOutputStat(entries.length + ' FLAG' + (entries.length !== 1 ? 'S' : '') + ' CONVERTED', true);
  downloadBtn.disabled = false;
});

// ── download ──
downloadBtn.addEventListener('click', () => {
  const out = outputArea.value; if (!out) return;
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(new Blob([out], {type:'text/x-lua'})), download: 'fflags.lua' });
  a.click(); URL.revokeObjectURL(a.href);
});

// ── clear ──
document.getElementById('clearBtn').addEventListener('click', () => {
  inputArea.value = ''; outputArea.value = '';
  showErr(''); setInputStat('EMPTY', false); setOutputStat('WAITING', false);
  refreshInput(); refreshOutput(); downloadBtn.disabled = true;
});
</script>
</body>
</html>
