<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFlags Converter</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #07080f;
  --surface:     #0d0e1a;
  --surface2:    #0b0c16;
  --border:      #1c1d2e;
  --border-hi:   #2c2e4a;
  --accent:      #6366f1;
  --accent-dim:  #1a1b3a;
  --accent-glow: rgba(99,102,241,.2);
  --accent-hi:   #a5b4fc;
  --green:       #34d399;
  --green-dim:   #0a1f16;
  --green-glow:  rgba(52,211,153,.15);
  --red:         #f87171;
  --amber:       #fbbf24;
  --text:        #c8cce8;
  --text-mid:    #5a5e82;
  --text-dim:    #2e3050;
  --mono:        'JetBrains Mono', monospace;
  --sans:        'Outfit', sans-serif;
  --r:           10px;
  --r-sm:        6px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  padding: 24px 24px 60px;
}

/* glow */
.glow {
  position: fixed;
  top: -180px; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 400px;
  background: radial-gradient(ellipse, rgba(99,102,241,.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* page content above glow */
.page { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 20px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.brand { display: flex; align-items: center; gap: 12px; }

.brand-icon {
  width: 36px; height: 36px;
  background: var(--accent-dim);
  border: 1px solid var(--border-hi);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 16px var(--accent-glow);
}

.brand-name {
  font-size: 1.1rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: -.02em;
  line-height: 1;
}

.brand-sub {
  font-family: var(--mono);
  font-size: .55rem;
  color: var(--text-mid);
  letter-spacing: .08em;
  margin-top: 3px;
}

.status-pill {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono);
  font-size: .58rem;
  letter-spacing: .08em;
  color: var(--accent-hi);
  background: var(--accent-dim);
  border: 1px solid rgba(99,102,241,.25);
  border-radius: 99px;
  padding: 5px 12px;
}

.pill-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 5px var(--accent);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── PANELS GRID ── */
.panels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
@media (max-width: 700px) { .panels { grid-template-columns: 1fr; } }

/* ── EDITOR PANEL ── */
.panel {
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--surface);
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
}
.panel:focus-within {
  border-color: var(--border-hi);
  box-shadow: 0 0 0 3px rgba(99,102,241,.06), 0 8px 28px rgba(0,0,0,.4);
}
.panel.out:focus-within {
  border-color: rgba(52,211,153,.28);
  box-shadow: 0 0 0 3px var(--green-glow), 0 8px 28px rgba(0,0,0,.4);
}
.panel.error {
  border-color: rgba(248,113,113,.3);
  box-shadow: 0 0 0 3px rgba(248,113,113,.05);
}
.panel.drag-over {
  border-color: var(--green);
  box-shadow: 0 0 0 3px var(--green-glow);
}

/* panel titlebar */
.panel-title-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 12px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.panel-left { display: flex; align-items: center; gap: 8px; }

.dots { display: flex; gap: 5px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-r { background: #ff5f57; }
.dot-y { background: #febc2e; }
.dot-g { background: #28c840; }

.panel-filename {
  font-family: var(--mono);
  font-size: .62rem;
  color: var(--text-mid);
  letter-spacing: .08em;
}

.panel-right { display: flex; align-items: center; gap: 7px; }

.lang-tag {
  font-family: var(--mono);
  font-size: .52rem;
  font-weight: 500;
  letter-spacing: .12em;
  padding: 2px 7px;
  border-radius: 4px;
}
.lang-json { color: var(--amber); background: rgba(251,191,36,.07); border: 1px solid rgba(251,191,36,.18); }
.lang-lua  { color: var(--green); background: rgba(52,211,153,.06); border: 1px solid rgba(52,211,153,.18); }

/* small panel buttons */
.panel-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px;
  border-radius: 5px;
  border: 1px solid rgba(52,211,153,.22);
  background: rgba(52,211,153,.06);
  color: var(--green);
  font-family: var(--mono);
  font-size: .58rem;
  letter-spacing: .06em;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: background .15s, border-color .15s;
}
.panel-btn:hover { background: rgba(52,211,153,.12); border-color: rgba(52,211,153,.4); }
.panel-btn:disabled { opacity: .3; cursor: not-allowed; pointer-events: none; }
.panel-btn input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.panel-btn .icon { width: 11px; height: 11px; }

/* editor area */
.editor-area {
  display: flex;
  height: 340px;
  overflow: hidden;
}

.line-nums {
  width: 40px;
  flex-shrink: 0;
  background: var(--surface2);
  border-right: 1px solid var(--border);
  padding: 13px 8px 13px 0;
  font-family: var(--mono);
  font-size: .68rem;
  line-height: 1.6;
  color: var(--text-dim);
  text-align: right;
  user-select: none;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.line-nums span { display: block; line-height: 1.6; font-size: .68rem; }

textarea {
  flex: 1;
  height: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--mono);
  font-size: .68rem;
  line-height: 1.6;
  padding: 13px 14px;
  outline: none;
  resize: none;
  overflow: auto;
  white-space: pre;
  word-wrap: normal;
  tab-size: 4;
}
#outputArea { color: var(--green); }
textarea::placeholder { color: var(--text-dim); }

/* status bar */
.panel-status {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 12px;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.stat {
  display: flex; align-items: center; gap: 4px;
  font-family: var(--mono);
  font-size: .56rem;
  color: var(--text-dim);
}
.stat.on { color: var(--green); }
.stat .icon { width: 11px; height: 11px; }

/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 14px;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-mid);
  font-family: var(--sans);
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.btn .icon { width: 14px; height: 14px; }
.btn:hover { background: #111224; color: var(--text); border-color: var(--border-hi); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,.35); }
.btn:active { transform: scale(.97); }

.btn-convert {
  background: linear-gradient(135deg, #38399a, #22235e);
  border-color: rgba(99,102,241,.4);
  color: var(--accent-hi);
  box-shadow: 0 0 18px rgba(99,102,241,.12);
}
.btn-convert:hover {
  background: linear-gradient(135deg, #4445b0, #2a2b70);
  border-color: rgba(99,102,241,.6);
  color: #c5c8ff;
  box-shadow: 0 0 26px rgba(99,102,241,.25);
}

.btn-clear:hover { background: rgba(248,113,113,.07); border-color: rgba(248,113,113,.3); color: var(--red); }

.err {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--mono);
  font-size: .62rem;
  color: var(--red);
  margin-left: auto;
  opacity: 0;
  transform: translateX(5px);
  transition: opacity .2s, transform .2s;
}
.err.show { opacity: 1; transform: translateX(0); }
.err .icon { width: 13px; height: 13px; }

/* ── FOOTER ── */
.footer {
  margin-top: 24px;
  font-family: var(--mono);
  font-size: .55rem;
  color: var(--text-dim);
  letter-spacing: .1em;
  text-align: center;
}

/* ── ANIMATIONS ── */
.topbar  { animation: up .4s cubic-bezier(.16,1,.3,1) both; }
.panels  { animation: up .4s cubic-bezier(.16,1,.3,1) .08s both; }
.toolbar { animation: up .4s cubic-bezier(.16,1,.3,1) .14s both; }
@keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="glow"></div>
<div class="page">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
          <line x1="4" y1="22" x2="4" y2="15"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">FFlags Converter</div>
        <div class="brand-sub">JSON TO LUA / BLOXSTRAP</div>
      </div>
    </div>
    <div class="status-pill">
      <div class="pill-dot"></div>
      READY
    </div>
  </div>

  <!-- PANELS -->
  <div class="panels">

    <!-- INPUT -->
    <div class="panel" id="inputPanel">
      <div class="panel-title-bar">
        <div class="panel-left">
          <div class="dots">
            <div class="dot dot-r"></div>
            <div class="dot dot-y"></div>
            <div class="dot dot-g"></div>
          </div>
          <span class="panel-filename">input.json</span>
        </div>
        <div class="panel-right">
          <button class="panel-btn" id="uploadBtn">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Upload
            <input type="file" accept=".json,application/json" id="fileInput">
          </button>
          <span class="lang-tag lang-json">JSON</span>
        </div>
      </div>
      <div class="editor-area">
        <div class="line-nums" id="inputNums"><span>1</span></div>
        <textarea id="inputArea" placeholder='{"FFlagDebugDisplayFPS":"true"}' spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </div>
      <div class="panel-status">
        <div class="stat" id="inputStat">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span id="inputStatTxt">EMPTY</span>
        </div>
        <div class="stat">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 17 10 11 4 5"/>
            <line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
          <span id="inputLines">0 lines</span>
        </div>
      </div>
    </div>

    <!-- OUTPUT -->
    <div class="panel out" id="outputPanel">
      <div class="panel-title-bar">
        <div class="panel-left">
          <div class="dots">
            <div class="dot dot-r"></div>
            <div class="dot dot-y"></div>
            <div class="dot dot-g"></div>
          </div>
          <span class="panel-filename">output.lua</span>
        </div>
        <div class="panel-right">
          <button class="panel-btn" id="downloadBtn" disabled>
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download
          </button>
          <span class="lang-tag lang-lua">LUA</span>
        </div>
      </div>
      <div class="editor-area">
        <div class="line-nums" id="outputNums"><span>1</span></div>
        <textarea id="outputArea" readonly placeholder="Converted Lua output will appear here..."></textarea>
      </div>
      <div class="panel-status">
        <div class="stat" id="outputStat">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span id="outputStatTxt">WAITING</span>
        </div>
        <div class="stat">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 17 10 11 4 5"/>
            <line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
          <span id="outputLines">0 lines</span>
        </div>
      </div>
    </div>

  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="btn btn-convert" id="convertBtn">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 3 21 3 21 9"/>
        <polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/>
        <line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
      Convert to Lua
    </button>

    <button class="btn btn-clear" id="clearBtn">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
      Clear
    </button>

    <div class="err" id="errMsg">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errTxt"></span>
    </div>
  </div>

  <div class="footer">FFLAG CONVERTER / JSON TO LUA / BLOXSTRAP COMPATIBLE</div>

</div>
<script>
const inputArea  = document.getElementById('inputArea');
const outputArea = document.getElementById('outputArea');
const inputPanel = document.getElementById('inputPanel');
const errMsg     = document.getElementById('errMsg');
const errTxt     = document.getElementById('errTxt');
const fileInput  = document.getElementById('fileInput');
const downloadBtn = document.getElementById('downloadBtn');

// ── line numbers ──
function updateNums(ta, id) {
  const count = (ta.value.match(/\n/g) || []).length + 1;
  const el = document.getElementById(id);
  el.innerHTML = Array.from({length: count}, (_, i) => '<span>' + (i+1) + '</span>').join('');
}
inputArea.addEventListener('scroll',  () => document.getElementById('inputNums').scrollTop  = inputArea.scrollTop);
outputArea.addEventListener('scroll', () => document.getElementById('outputNums').scrollTop = outputArea.scrollTop);

function refreshInput() {
  updateNums(inputArea, 'inputNums');
  const n = inputArea.value.split('\n').length;
  document.getElementById('inputLines').textContent = n + ' line' + (n !== 1 ? 's' : '');
}
function refreshOutput() {
  updateNums(outputArea, 'outputNums');
  const n = outputArea.value ? outputArea.value.split('\n').length : 0;
  document.getElementById('outputLines').textContent = n + ' line' + (n !== 1 ? 's' : '');
}

// ── status ──
function setInputStat(txt, on) {
  document.getElementById('inputStatTxt').textContent = txt;
  document.getElementById('inputStat').className = 'stat' + (on ? ' on' : '');
}
function setOutputStat(txt, on) {
  document.getElementById('outputStatTxt').textContent = txt;
  document.getElementById('outputStat').className = 'stat' + (on ? ' on' : '');
}

// ── error ──
function showErr(msg) {
  errTxt.textContent = msg;
  msg ? errMsg.classList.add('show') : errMsg.classList.remove('show');
  msg ? inputPanel.classList.add('error') : inputPanel.classList.remove('error');
}

// ── live validation ──
inputArea.addEventListener('input', () => {
  outputArea.value = ''; refreshOutput();
  setOutputStat('WAITING', false);
  showErr(''); refreshInput();
  const val = inputArea.value.trim();
  if (!val) { setInputStat('EMPTY', false); return; }
  try {
    const p = JSON.parse(val);
    if (typeof p !== 'object' || Array.isArray(p) || p === null) {
      showErr('Input must be a JSON object.'); setInputStat('INVALID', false);
    } else {
      const c = Object.keys(p).length;
      setInputStat(c + ' FLAG' + (c !== 1 ? 'S' : '') + ' FOUND', true);
    }
  } catch(e) { showErr('Invalid JSON.'); setInputStat('INVALID', false); }
});

// ── upload ──
fileInput.addEventListener('change', () => {
  const file = fileInput.files[0]; if (!file) return;
  new FileReader().onload = e => { inputArea.value = e.target.result; inputArea.dispatchEvent(new Event('input')); };
  const r = new FileReader(); r.onload = e => { inputArea.value = e.target.result; inputArea.dispatchEvent(new Event('input')); }; r.readAsText(file);
  fileInput.value = '';
});

// ── drag drop ──
inputPanel.addEventListener('dragover',  e => { e.preventDefault(); inputPanel.classList.add('drag-over'); });
inputPanel.addEventListener('dragleave', () => inputPanel.classList.remove('drag-over'));
inputPanel.addEventListener('drop', e => {
  e.preventDefault(); inputPanel.classList.remove('drag-over');
  const file = e.dataTransfer.files[0]; if (!file) return;
  const r = new FileReader(); r.onload = ev => { inputArea.value = ev.target.result; inputArea.dispatchEvent(new Event('input')); }; r.readAsText(file);
});

// ── converter ──
function capitalizeValue(val) {
  if (val === null) return "nil";
  const s = String(val);
  if (s.toLowerCase() === 'true')  return 'True';
  if (s.toLowerCase() === 'false') return 'False';
  if (s.toLowerCase() === 'nil')   return 'False';
  return s;
}

document.getElementById('convertBtn').addEventListener('click', () => {
  const input = inputArea.value.trim();
  showErr('');
  if (!input) { showErr('Paste or upload a JSON object first.'); return; }
  let json;
  try { json = JSON.parse(input); } catch(e) { showErr('Invalid JSON: ' + e.message); return; }
  if (typeof json !== 'object' || Array.isArray(json) || json === null) { showErr('Input must be a JSON object.'); return; }
  const seen = new Set();
  const entries = Object.entries(json).filter(([k]) => { if (seen.has(k)) return false; seen.add(k); return true; });
  if (!entries.length) { showErr('No flags found.'); return; }

  const flagLines = entries.map(([k,v]) => '    ["' + k + '"] = "' + capitalizeValue(v) + '",').join('\n');
  outputArea.value = [
    'local cloneref = cloneref or function(...) return ... end',
    'local HttpService = cloneref(game:GetService("HttpService"))',
    'local getgenv = getgenv or _G',
    '',
    'getgenv().Bloxstrap = {}',
    'local files = {}',
    '',
    'local writefile = writefile or function(name, src)',
    '    files[name] = src',
    'end',
    '',
    'local isfile = isfile or function(file)',
    '    return readfile(file) ~= nil and true or false',
    'end',
    '',
    'getgenv().errorlog = getgenv().errorlog or "Bloxstrap/Logs/crashlog" .. HttpService:GenerateGUID(false) .. ".txt"',
    '',
    'Bloxstrap.ToggleFFlag = loadstring(game:HttpGet("https://raw.githubusercontent.com/uwedot/flagging/refs/heads/main/ToggleFFlag.txt"))()',
    'Bloxstrap.GetFFlag = loadstring(game:HttpGet("https://raw.githubusercontent.com/uwedot/flagging/refs/heads/main/GetFFlag.txt"))()',
    'Bloxstrap.TouchEnabled = cloneref(game:GetService("UserInputService")).TouchEnabled',
    '',
    'local flags = {',
    flagLines,
    '}',
    '',
    'writefile("Bloxstrap/FFlags.json", HttpService:JSONEncode(flags))',
    '',
    'for flag, value in pairs(flags) do',
    '    pcall(function()',
    '        Bloxstrap.ToggleFFlag(flag, value)',
    '    end)',
    'end'
  ].join('\n');

  refreshOutput();
  setOutputStat(entries.length + ' FLAG' + (entries.length !== 1 ? 'S' : '') + ' CONVERTED', true);
  downloadBtn.disabled = false;
});

// ── download ──
downloadBtn.addEventListener('click', () => {
  const out = outputArea.value; if (!out) return;
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(new Blob([out], {type:'text/x-lua'})), download: 'fflags.lua' });
  a.click(); URL.revokeObjectURL(a.href);
});

// ── clear ──
document.getElementById('clearBtn').addEventListener('click', () => {
  inputArea.value = ''; outputArea.value = '';
  showErr(''); setInputStat('EMPTY', false); setOutputStat('WAITING', false);
  refreshInput(); refreshOutput(); downloadBtn.disabled = true;
});
</script>
</body>
</html>
